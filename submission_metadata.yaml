ai_usage_summary: |
  Claude (Anthropic) was used as a pair-programming and code-review assistant:
  to discuss the scoring architecture, draft and refactor Python modules, run
  diagnostics on the ranking distribution, and tune weights/thresholds against
  the JD. All design decisions were reviewed and validated by the team against
  the official validator and the challenge spec. No candidate data was sent to
  any hosted LLM during ranking — the ranking pipeline is fully offline and
  contains no LLM calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Interpretable hybrid ranker. Every candidate gets a transparent base-fit
  score: a weighted blend of title+career relevance (0.26), plain-language
  career evidence (0.22), endorsement/duration-weighted skill trust (0.18),
  semantic similarity to the JD (0.14), experience-band fit (0.10), location
  (0.06) and education (0.04). On top of base-fit we apply explicit, JD-mapped
  multipliers: a keyword-stuffer gate (non-technical career collapses the title
  signal), a services-only penalty, a CV/speech-distractor penalty, a
  stopped-coding penalty, a small product-company bonus, and a hard honeypot
  penalty. A separate additive behavioral modifier (availability, recruiter
  responsiveness, recency, notice period) re-ranks *within* a quality tier and
  sharply down-weights genuine "ghosts" — but is deliberately bounded so it
  never lets a weaker-fit profile leapfrog a clearly stronger one. The semantic
  component is what surfaces plain-language Tier-5 candidates who built the
  right systems without using buzzwords. Honeypots are detected via internal
  impossibility checks and removed from the shortlist. Runtime ~65s for 100k
  candidates on one CPU core, no GPU, no network.

